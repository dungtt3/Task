services:
  # ==================== Infrastructure ====================
  mongodb:
    image: mongo:7
    container_name: taskmanager-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - taskmanager-net
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskmanager-redis
    ports:
      - "6379:6379"
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: taskmanager-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - taskmanager-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: taskmanager-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - taskmanager-net
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 15s
      timeout: 10s
      retries: 5

  # ==================== Backend Services ====================
  auth-api:
    build:
      context: .
      dockerfile: src/Services/Auth/TaskManager.Auth.API/Dockerfile
    container_name: taskmanager-auth
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: mongodb://mongodb:27017
      MongoDB__DatabaseName: auth_db
      Redis__ConnectionString: redis:6379
      Jwt__Secret: YourSuperSecretKeyThatIsAtLeast32BytesLong!2024
      Jwt__Issuer: TaskManager
      Jwt__Audience: TaskManagerApp
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - taskmanager-net

  task-api:
    build:
      context: .
      dockerfile: src/Services/Task/TaskManager.Task.API/Dockerfile
    container_name: taskmanager-task
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: mongodb://mongodb:27017
      MongoDB__DatabaseName: task_db
      Redis__ConnectionString: redis:6379
      Kafka__BootstrapServers: kafka:9092
      Jwt__Secret: YourSuperSecretKeyThatIsAtLeast32BytesLong!2024
      Jwt__Issuer: TaskManager
      Jwt__Audience: TaskManagerApp
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - taskmanager-net

  project-api:
    build:
      context: .
      dockerfile: src/Services/Project/TaskManager.Project.API/Dockerfile
    container_name: taskmanager-project
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: mongodb://mongodb:27017
      MongoDB__DatabaseName: project_db
      Redis__ConnectionString: redis:6379
      Kafka__BootstrapServers: kafka:9092
      Jwt__Secret: YourSuperSecretKeyThatIsAtLeast32BytesLong!2024
      Jwt__Issuer: TaskManager
      Jwt__Audience: TaskManagerApp
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - taskmanager-net

  notification-api:
    build:
      context: .
      dockerfile: src/Services/Notification/TaskManager.Notification.API/Dockerfile
    container_name: taskmanager-notification
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: mongodb://mongodb:27017
      MongoDB__DatabaseName: notification_db
      Redis__ConnectionString: redis:6379
      Kafka__BootstrapServers: kafka:9092
      Jwt__Secret: YourSuperSecretKeyThatIsAtLeast32BytesLong!2024
      Jwt__Issuer: TaskManager
      Jwt__Audience: TaskManagerApp
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - taskmanager-net

  # ==================== Gateway ====================
  gateway:
    build:
      context: .
      dockerfile: src/Gateway/TaskManager.Gateway/Dockerfile
    container_name: taskmanager-gateway
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Secret: YourSuperSecretKeyThatIsAtLeast32BytesLong!2024
      Jwt__Issuer: TaskManager
      Jwt__Audience: TaskManagerApp
    depends_on:
      - auth-api
      - task-api
      - project-api
      - notification-api
    networks:
      - taskmanager-net

  # ==================== Frontend ====================
  frontend:
    build:
      context: .
      dockerfile: src/Frontend/Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - taskmanager-net

volumes:
  mongo-data:

networks:
  taskmanager-net:
    driver: bridge
